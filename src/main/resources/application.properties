server.port=${PORT:8080}
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:quickmail}
spring.data.mongodb.auto-index-creation=true

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Gemini
gemini.api-url=https://generativelanguage.googleapis.com
gemini.api-key=${GEMINI_API_KEY}
gemini.generate-path=v1beta/models/gemini-3-flash-preview:generateContent
gemini.timeout=12s

# groq
groq.api-key=${GROQ_API_KEY}
groq.api-url=https://api.groq.com/openai/v1
groq.chat-endpoint=/chat/completions
groq.model=llama-3.3-70b-versatile

groq.timeout=12s

# openrouter
openrouter.api-url=https://openrouter.ai/api/v1
openrouter.api-key=${OPENROUTER_API_KEY}
openrouter.chat-endpoint=/chat/completions
openrouter.model=openai/gpt-4o-mini
openrouter.timeout=20s

app.ai.retry.max-attempts=2
app.ai.retry.backoff=400ms
app.ai.prompt.default-tone=professional
app.ai.max-prompt-length=12000

app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.expiration=2592000000
app.auth.otp.expiry=5m
app.auth.mail.subject=${AUTH_MAIL_SUBJECT:Your QuickMail OTP}
app.auth.mail.from-name=${AUTH_MAIL_FROM_NAME:QuickMail}
app.auth.mail.log-only=${AUTH_MAIL_LOG_ONLY:false}

app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
app.cors.allowed-origin-patterns=chrome-extension://*
