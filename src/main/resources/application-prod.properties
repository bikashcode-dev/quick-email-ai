spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=quickmail

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=quickmail.otp@gmail.com
spring.mail.password=${MAIL_PASSWORD}

gemini.api-key=${GEMINI_API_KEY}
groq.api-key=${GROQ_API_KEY}
openrouter.api-key=${OPENROUTER_API_KEY}

app.auth.jwt.secret=${JWT_SECRET}
app.auth.mail.subject=Your QuickMail OTP
app.auth.mail.from-name=QuickMail
app.auth.mail.log-only=false
